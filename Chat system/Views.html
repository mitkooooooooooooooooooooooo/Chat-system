@model ChatApp.Models.ChatViewModel

<div class="container mt-4">
    <h3>Messages:</h3>
    <div class="border p-3 mb-4" style="background-color: #f8f9fa; min-height: 200px;">
        @foreach (var msg in Model.Messages)
        {
            <div class="card mb-2" style="max-width: 400px;">
                <div class="card-body">
                    <p class="mb-1">@msg.MessageText</p>
                    <small class="text-muted">— @msg.Sender</small>
                </div>
            </div>
        }
    </div>

    <div class="card p-3">
        <h5>Send a new message</h5>
        <form asp-action="Send" method="post">
            <div class="row">
                <div class="col-8">
                    <label>Message:</label>
                    <textarea asp-for="CurrentMessage.MessageText" class="form-control"></textarea>
                </div>
                <div class="col-4">
                    <label>Sender Name:</label>
                    <input asp-for="CurrentMessage.Sender" class="form-control" />
                    <button type="submit" class="btn btn-primary mt-3">Send</button>
                </div>
            </div>
        </form>
    </div>
</div>
